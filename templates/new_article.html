{% extends 'base.html' %}

{% block head %}
<title>{{ mode|capitalize }} Article</title>
{% endblock %}

{% block body %}
<div class="form-container">
  <header class="header-bar">
    <h1>{% if mode == 'edit' %}Edit{% else %}New{% endif %}Article</h1>
  </header>
  <form method="POST">
    <label>Title</label>
    <input type="text" name="title" value="{{ article.title if article else '' }}" required>

    <label>Publication Date</label>
    <input type="date" name="date"
           value="{{ article.date.strftime('%Y-%m-%d') if article else today}}" required>

    <label>Content</label>
    <textarea name="content" required>{{ article.content if article else '' }}</textarea>
    <button type="submit">
      {% if mode == 'edit' %}Update{% else %}Create{% endif %}Article
    </button>
  </form>
</div>
{% endblock %}
