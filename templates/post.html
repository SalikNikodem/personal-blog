{% extends 'base.html' %}

{% block head %}
<title>{{ article.title }}</title>
{% endblock %}

{% block body %}
<div class="article_container">
    <h1 class="article_title">{{ article.title }}</h1>
    <span class="post_date">{{ article.date.strftime('%B %d, %Y') }}</span>
    <div class="post-content">
        {{ article.content }}
    </div>

    <div class="back_link">
        <a href="/">← Back to Home</a>
    </div>
</div>
{% endblock %}
